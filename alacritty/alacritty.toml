# DOSrice — Alacritty base config
# Font, cursor and window behavior. Color theme is loaded via import below.

[general]
import = [
    "themes/dos-blue.toml"
]

[font]
normal = { family = "Terminus", style = "Regular" }
bold = { family = "Terminus", style = "Bold" }
size = 12.0

[window]
padding = { x = 8, y = 8 }
opacity = 1.0
decorations = "full"
dynamic_padding = false

[cursor]
style = { shape = "Block", blinking = "On" }