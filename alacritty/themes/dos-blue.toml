# DOS Blue — classic MS-DOS CGA palette
# Blue background (#0000AA) + light gray text (#AAAAAA), like the EDIT.COM editor

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#0000AA"
foreground = "#AAAAAA"

[colors.cursor]
text = "#0000AA"
cursor = "#FFFFFF"

# 16-color ANSI palette = the real IBM CGA color palette from the 1980s
# "normal" = base colors (00/AA values), "bright" = lighter versions (55/FF values)
[colors.normal]
black   = "#000000"
red     = "#AA0000"
green   = "#00AA00"
yellow  = "#AA5500"  # in real CGA this reads more brown/orange than yellow
blue    = "#0000AA"
magenta = "#AA00AA"
cyan    = "#00AAAA"
white   = "#AAAAAA"

[colors.bright]
black   = "#555555"
red     = "#FF5555"
green   = "#55FF55"
yellow  = "#FFFF55"
blue    = "#5555FF"
magenta = "#FF55FF"
cyan    = "#55FFFF"
white   = "#FFFFFF"
