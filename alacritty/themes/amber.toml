# Amber — monochrome amber terminal
# Simulates old single-color business terminals (no RGB, only amber phosphor)
# All ANSI colors map to the same amber hue at different intensities,
# since the real hardware could only display one color

[colors.primary]
background = "#1A0F00"
foreground = "#FFB000"

[colors.cursor]
text = "#1A0F00"
cursor = "#FFB000"

# Every "color" below is amber — normal = dimmer, bright = full intensity
# This mimics hardware that physically could not render other hues

[colors.normal]
black   = "#1A0F00"  
red     = "#5C3D00"
green   = "#7A5200"
yellow  = "#996600"
blue    = "#B37700"
magenta = "#CC8800"
cyan    = "#E69900"
white   = "#B37700"


[colors.bright]
black   = "#402D00"  
red     = "#804D00"
green   = "#996600"
yellow  = "#B37700"
blue    = "#CC8800"
magenta = "#E69900"
cyan    = "#FFA000"
white   = "#FFB000"  
